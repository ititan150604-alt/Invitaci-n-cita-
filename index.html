<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Una invitación especial ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
    background:linear-gradient(#ffe6ef,#fff);
    overflow:hidden;
}

.contenedor{
    text-align:center;
    background:white;
    padding:35px;
    border-radius:25px;
    box-shadow:0 0 20px #ccc;
    max-width:400px;
}

h1{
    color:#e91e63;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:20px;
    font-size:18px;
    cursor:pointer;
    margin:10px;
}

.si{
    background:#e91e63;
    color:white;
}

.no{
    background:#555;
    color:white;
    position:absolute;
}

#mensaje{
    height:30px;
    color:#e91e63;
    font-weight:bold;
}

.oculto{
    display:none;
}

.opcion{
    background:#f8bbd0;
    width:90%;
}

.corazon{
    position:absolute;
    animation:subir 3s linear forwards;
}

@keyframes subir{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(-500px);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="contenedor" id="inicio">

<h1>¿Quieres salir conmigo? ❤️</h1>

<div id="mensaje"></div>

<button class="si" onclick="aceptar()">Sí ❤️</button>
<button class="no" id="no">No 😢</button>

</div>


<div class="contenedor oculto" id="invitacion">

<h1>Sabía que aceptarías ❤️</h1>

<p>Ahora toca elegir nuestro plan:</p>

<button class="opcion">🌳 Parque con lago</button>
<p>Una caminata tranquila, platicar y hacer algo que nunca hemos hecho juntos.</p>

<button class="opcion">☕ Café o comida</button>

<button class="opcion">🎬 Cine o paseo</button>

<br><br>

<p>
📅 Día: ___________<br>
⏰ Hora: ___________<br>
📍 Lugar: ___________
</p>

</div>


<script>

let no=document.getElementById("no");
let mensaje=document.getElementById("mensaje");
let intentos=0;

no.addEventListener("mouseover", mover);

function mover(){

    intentos++;

    let x=Math.random()*(window.innerWidth-100);
    let y=Math.random()*(window.innerHeight-50);

    no.style.left=x+"px";
    no.style.top=y+"px";

    if(intentos==1){
        mensaje.innerHTML="Ya casi 😏";
    }

    if(intentos==2){
        mensaje.innerHTML="Jajaja, casi lo logras 😂";
    }

    if(intentos>=3){
        mensaje.innerHTML="Creo que ese botón no quiere que digas que no 😌";
    }
}


function aceptar(){

document.getElementById("inicio").classList.add("oculto");
document.getElementById("invitacion").classList.remove("oculto");

for(let i=0;i<30;i++){

let c=document.createElement("div");
c.innerHTML="❤️";
c.className="corazon";

c.style.left=Math.random()*100+"vw";
c.style.top="90vh";

document.body.appendChild(c);

setTimeout(()=>{
c.remove();
},3000);

}

}

</script>

</body>
</html>
