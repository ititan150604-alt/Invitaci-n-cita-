<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Una pregunta para ti ❤️</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#ff8fb1,#ffd4e5);
overflow:hidden;
}

.card{
background:white;
padding:35px;
border-radius:20px;
width:340px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,.2);
position:relative;
}

h1{
color:#ff3f7f;
margin-bottom:10px;
}

button{
padding:12px 25px;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
margin:10px;
}

#yes{
background:#4CAF50;
color:white;
}

#no{
background:#f44336;
color:white;
position:absolute;
}

#segunda,#final{
display:none;
}

input{
width:90%;
padding:10px;
margin:8px 0;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

select{
width:95%;
padding:10px;
margin:8px 0;
border-radius:10px;
font-size:16px;
}
</style>
</head>

<body>

<div class="card">

<div id="primera">
<h1>Hola ❤️</h1>
<p>Tengo una pregunta muy importante...</p>
<h2>¿Te gustaría salir conmigo? 🥹</h2>

<button id="yes">Sí 💕</button>
<button id="no">No 🙈</button>
</div>

<div id="segunda">
<h2>¡Qué emoción! 😍</h2>

<p>Ahora elige el día que más te guste.</p>

<input type="date" id="fecha">

<p>¿A qué hora?</p>

<input type="time" id="hora">

<p>¿Qué se te antoja?</p>

<select id="lugar">
<option>Cenar 🍝</option>
<option>Ir por un café ☕</option>
<option>Ver una película 🎬</option>
<option>Helado 🍦</option>
<option>Pasear 🌇</option>
</select>

<br><br>

<button onclick="confirmar()">Confirmar ❤️</button>

</div>

<div id="final">
<h2>¡¡Plan confirmado!! 🎉</h2>

<p id="texto"></p>

<h3>Estoy muy emocionado por salir contigo ❤️🥹</h3>

</div>

</div>

<script>

const no=document.getElementById("no");

no.addEventListener("mouseover",()=>{

let x=Math.random()*(window.innerWidth-120);

let y=Math.random()*(window.innerHeight-60);

no.style.left=x+"px";
no.style.top=y+"px";

});

document.getElementById("yes").onclick=()=>{

document.getElementById("primera").style.display="none";
document.getElementById("segunda").style.display="block";

}

function confirmar(){

let fecha=document.getElementById("fecha").value;
let hora=document.getElementById("hora").value;
let lugar=document.getElementById("lugar").value;

document.getElementById("segunda").style.display="none";
document.getElementById("final").style.display="block";

document.getElementById("texto").innerHTML=
"Entonces nos vemos el <b>"+fecha+"</b> a las <b>"+hora+"</b> para <b>"+lugar+"</b>. ❤️";

}

</script>

</body>
</html>
