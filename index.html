<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tengo una pregunta...</title>

<style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(135deg,#ff9ecb,#ffd6e8);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.card{
background:white;
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.2);
position:relative;
width:320px;
}

h1{
color:#ff4081;
}

button{
padding:12px 28px;
font-size:18px;
border:none;
border-radius:12px;
cursor:pointer;
margin:10px;
transition:.2s;
}

#yes{
background:#4CAF50;
color:white;
}

#no{
background:#F44336;
color:white;
position:absolute;
}

#mensaje{
display:none;
margin-top:20px;
font-size:22px;
color:#ff4081;
font-weight:bold;
}
</style>

</head>

<body>

<div class="card">

<h1>Tengo una pregunta ❤️</h1>

<p>¿Te gustaría salir conmigo? 😊</p>

<button id="yes">Sí 💖</button>

<button id="no">No 😅</button>

<div id="mensaje">
¡¡Sabía que dirías que sí!! 🥰❤️
</div>

</div>

<script>

const no=document.getElementById("no");

no.addEventListener("mouseover",()=>{

const x=Math.random()*(window.innerWidth-120);

const y=Math.random()*(window.innerHeight-60);

no.style.left=x+"px";

no.style.top=y+"px";

});

document.getElementById("yes").onclick=()=>{

document.getElementById("mensaje").style.display="block";

};

</script>

</body>
</html>
